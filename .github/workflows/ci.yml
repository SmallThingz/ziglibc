name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  docs-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2984+cb7d2b056

      - name: Zig fmt check
        shell: bash
        run: |
          files=$(find . -type f -name '*.zig' \
            -not -path './.zig-cache/*' \
            -not -path './zig-out/*')
          zig fmt --check $files

      - name: Unit tests
        run: zig build test

      - name: Conformance suites
        run: zig build conformance
